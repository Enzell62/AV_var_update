<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гороскоп</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8eef4;
    font-family: 'Nunito', sans-serif;
    padding: 12px;
  }

  /* Группа из 3 знаков — это и есть объект для скриншота */
  .sign-group {
    width: 390px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  /* Одна карточка знака */
  .sign-slide {
    width: 390px;
    background-image: url('bg.jpg');
    background-size: cover;
    background-position: center;
    background-color: #ddeeff;
    border-radius: 14px;
    overflow: hidden;
    padding: 14px 16px 16px;
  }

  /* Шапка: иконка + имя/период */
  .row-top {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .sign-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .sign-meta { flex: 1; }

  .sign-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: #111;
    line-height: 1.1;
    margin-bottom: 3px;
  }

  .sign-period {
    font-size: 11px;
    color: #555;
    letter-spacing: 0.5px;
  }

  /* Подложка под текстом */
  .sign-text-wrap {
    background: rgba(255, 255, 255, 0.82);
    border-radius: 10px;
    padding: 11px 13px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
  }

  .sign-text {
    font-size: 12.5px;
    line-height: 1.65;
    color: #222;
  }
</style>
</head>
<body>

<div id="app">Загрузка...</div>

<script>
const SIGNS = [
  { tag:'Horo_aries',       ru:'Овен',        icon:'icon_aries.png'       },
  { tag:'Horo_taurus',      ru:'Телец',       icon:'icon_taurus.png'      },
  { tag:'Horo_gemini',      ru:'Близнецы',    icon:'icon_gemini.png'      },
  { tag:'Horo_cancer',      ru:'Рак',         icon:'icon_cancer.png'      },
  { tag:'Horo_leo',         ru:'Лев',         icon:'icon_leo.png'         },
  { tag:'Horo_virgo',       ru:'Дева',        icon:'icon_virgo.png'       },
  { tag:'Horo_libra',       ru:'Весы',        icon:'icon_libra.png'       },
  { tag:'Horo_scorpio',     ru:'Скорпион',    icon:'icon_scorpio.png'     },
  { tag:'Horo_sagittarius', ru:'Стрелец',     icon:'icon_sagittarius.png' },
  { tag:'Horo_capricorn',   ru:'Козерог',     icon:'icon_capricorn.png'   },
  { tag:'Horo_aquarius',    ru:'Водолей',     icon:'icon_aquarius.png'    },
  { tag:'Horo_pisces',      ru:'Рыбы',        icon:'icon_pisces.png'      },
];

// Группы по 3 знака — 4 группы итого
const GROUPS = [
  { id: 'group-1', signs: SIGNS.slice(0, 3)  },
  { id: 'group-2', signs: SIGNS.slice(3, 6)  },
  { id: 'group-3', signs: SIGNS.slice(6, 9)  },
  { id: 'group-4', signs: SIGNS.slice(9, 12) },
];

function getTag(doc, tag) {
  const el = doc.getElementsByTagName(tag)[0];
  return el ? el.textContent.trim() : '';
}

function buildCard(sign, text, period) {
  return `
    <div class="sign-slide" id="slide-${sign.tag}">
      <div class="row-top">
        <img class="sign-icon" src="${sign.icon}" alt="${sign.ru}">
        <div class="sign-meta">
          <div class="sign-name">${sign.ru}</div>
          <div class="sign-period">${period}</div>
        </div>
      </div>
      <div class="sign-text-wrap">
        <div class="sign-text">${text || 'Нет данных'}</div>
      </div>
    </div>`;
}

async function run() {
  let period = '';
  let texts = {};

  try {
    const r = await fetch('av.xml');
    const xml = await r.text();
    const doc = new DOMParser().parseFromString(xml, 'application/xml');
    period = getTag(doc, 'Horo_date');
    for (const s of SIGNS) texts[s.tag] = getTag(doc, s.tag);
  } catch(e) {
    period = '—';
    for (const s of SIGNS) texts[s.tag] = 'Ошибка: ' + e.message;
  }

  let html = '';
  for (const group of GROUPS) {
    html += `<div class="sign-group" id="${group.id}">`;
    for (const sign of group.signs) {
      html += buildCard(sign, texts[sign.tag], period);
    }
    html += `</div>`;
  }

  document.getElementById('app').innerHTML = html;
}

run();
</script>
</body>
</html>
