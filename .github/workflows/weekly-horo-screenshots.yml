name: Weekly Horoscope Screenshots

on:
  schedule:
    - cron: '0 5 * * 5'  # пятница 5:00 UTC (8:00 МСК)
  workflow_dispatch:       # ручной запуск для теста

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps for Puppeteer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            fonts-noto-color-emoji \
            libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2

      - name: Install Node deps
        run: npm install puppeteer archiver

      - name: Run screenshot script
        run: node screenshot_horo.js

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add horoscope.zip horo_img/
          git diff --staged --quiet || git commit -m "horoscope $(date +'%d.%m.%Y')"
          git push
